version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - echo "=== Environment Info ==="
      - echo "Node version:" && node -v
      - echo "NPM version:" && npm -v
      - echo "Working directory:" && pwd
      - echo "Directory contents:" && ls -la
      - echo "=== Installing Dependencies ==="
      - npm install
    build:
      - echo "=== Build Process Start ==="
      - NODE_ENV=development npm run build
      - echo "=== Build Process End ==="
run:
  command: npm run dev
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: "development"
    - name: DATABASE_URL
      value: "mysql://admin:password@database-1.cjo806iq4azh.ap-northeast-1.rds.amazonaws.com:3306/trouble"
    - name: NEXTAUTH_URL
      value: "https://${APPRUNNER_SERVICE_URL}"
    - name: NEXTAUTH_SECRET
      value: "development_secret_key_for_nextauth"