version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - echo "=== Environment Info ==="
      - echo "Node version:" && node -v
      - echo "NPM version:" && npm -v
      - echo "Working directory:" && pwd
      - echo "Directory contents:" && ls -la
      - echo "=== Installing Dependencies ==="
      - npm ci --verbose
    build:
      - echo "=== Build Process Start ==="
      - echo "Checking next.config.js exists:" && ls -la next.config.js
      - echo "Checking package.json scripts:" && cat package.json | grep scripts -A 5
      - echo "=== Starting Build ==="
      - npm run build --verbose
      - echo "=== Build Process End ==="
run:
  command: npm start
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: "production"
    - name: DATABASE_URL
      value: "mysql://admin:password@database-1.cjo806iq4azh.ap-northeast-1.rds.amazonaws.com:3306/trouble"
    - name: NEXTAUTH_URL
      value: "https://${APPRUNNER_SERVICE_URL}"
    - name: NEXTAUTH_SECRET
      value: "development_secret_key_for_nextauth_please_change_in_production"
