version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - echo "Node version:" && node -v
      - echo "NPM version:" && npm -v
      - echo "Installing dependencies..."
      - npm ci
      - echo "Installing prisma..."
      - npm install prisma
      - npm install @prisma/client
    build:
      - echo "Directory contents:" && ls -la
      - echo "Generating Prisma Client..."
      - npx prisma --version
      - PRISMA_DEBUG=* npx prisma generate
      - echo "Building Next.js application..."
      - NODE_ENV=production npm run build
      - echo "Build completed."
run:
  command: npm start
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: "production"
    - name: DATABASE_URL
      value: "mysql://admin:password@database-1.cjo806iq4azh.ap-northeast-1.rds.amazonaws.com:3306/trouble"
    - name: NEXTAUTH_URL
      value: "https://${APPRUNNER_SERVICE_URL}"
    - name: NEXTAUTH_SECRET
      value: "development_secret_key_for_nextauth_please_change_in_production"
